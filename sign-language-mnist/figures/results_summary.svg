<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Sign Language MNIST results summary</title>
  <desc id="desc">Bar chart comparing accuracy for the main perceptron and neural-network experiments.</desc>
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="40" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Sign Language MNIST: accuracy by experiment</text>
  <text x="40" y="76" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">From-scratch NumPy perceptrons and neural networks. Raw-label multi-class result is kept as the primary held-out result.</text>

  <line x1="250" y1="340" x2="860" y2="340" stroke="#d1d5db"/>
  <line x1="250" y1="280" x2="860" y2="280" stroke="#e5e7eb"/>
  <line x1="250" y1="220" x2="860" y2="220" stroke="#e5e7eb"/>
  <line x1="250" y1="160" x2="860" y2="160" stroke="#e5e7eb"/>
  <line x1="250" y1="100" x2="860" y2="100" stroke="#e5e7eb"/>

  <text x="214" y="345" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0.0</text>
  <text x="214" y="285" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0.25</text>
  <text x="214" y="225" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0.50</text>
  <text x="214" y="165" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">0.75</text>
  <text x="214" y="105" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">1.0</text>

  <text x="40" y="125" font-family="Arial, sans-serif" font-size="14" fill="#111827">Binary perceptron</text>
  <rect x="250" y="105" width="596" height="32" rx="3" fill="#2563eb"/>
  <text x="856" y="127" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">0.993</text>

  <text x="40" y="181" font-family="Arial, sans-serif" font-size="14" fill="#111827">Multi-class perceptron</text>
  <rect x="250" y="161" width="227" height="32" rx="3" fill="#60a5fa"/>
  <text x="487" y="183" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">0.378</text>

  <text x="40" y="237" font-family="Arial, sans-serif" font-size="14" fill="#111827">Binary neural network</text>
  <rect x="250" y="217" width="599" height="32" rx="3" fill="#059669"/>
  <text x="859" y="239" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">0.999</text>

  <text x="40" y="293" font-family="Arial, sans-serif" font-size="14" fill="#111827">Multi-class NN, raw labels</text>
  <rect x="250" y="273" width="275" height="32" rx="3" fill="#f59e0b"/>
  <text x="535" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">0.458</text>

  <text x="40" y="349" font-family="Arial, sans-serif" font-size="14" fill="#111827">Aligned-label diagnostic</text>
  <rect x="250" y="329" width="532" height="32" rx="3" fill="#10b981"/>
  <text x="792" y="351" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">0.886</text>

  <text x="250" y="388" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Accuracy on held-out Sign Language MNIST test data unless noted as diagnostic.</text>
</svg>
